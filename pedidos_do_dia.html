<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>A Fornalha - Pedidos do Dia</title>
    <link rel="stylesheet" href="pedidos_do_dia.css">
</head>
<body>

<div class="container">

    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-logo-icon">🍕</div>
            <div>
                <div class="sidebar-logo-name">A Fornalha Pizzaria</div>
                <div class="sidebar-logo-sub">Gerenciador de pedidos</div>
            </div>
        </div>

        <nav>
            <span class="menu-label">MENU</span>
            
            <button type="button" class="menu" onclick="window.location.href='painel_geral.html'">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/>
                </svg> Painel geral
            </button>
            
            <button type="button" class="menu active" onclick="window.location.href='pedidos_do_dia.html'">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M2 4h12M2 8h12M2 12h7"/>
                </svg> Pedidos do dia
            </button>
            
            <button type="button" class="menu" onclick="window.location.href='novo_pedido.html'">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="2" width="12" height="12" rx="1.5"/><path d="M8 5v6M5 8h6"/>
                </svg> Novo pedido
            </button>
            
            <button type="button" class="menu" onclick="window.location.href='historico.html'">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M2 12L5 8l3 3 3-5 3 2"/>
                </svg> Histórico e relatórios
            </button>
        </nav>
    </aside>

    <main class="content">

        <header class="top header-historico">
            <div class="top-title">
                <h1>Pedidos do dia</h1>
                <span class="data-atual" id="data-atual">Carregando...</span>
            </div>
            <button class="btn btn-outline" onclick="window.location.href='novo_pedido.html'">+ Novo pedido</button>
        </header>

        <div class="summary-grid">
            <div class="summary-card">
                <span class="summary-label">Total</span>
                <strong class="summary-value" id="resumo-total">0</strong>
            </div>
            <div class="summary-card">
                <span class="summary-label">Em andamento</span>
                <strong class="summary-value text-red" id="resumo-andamento">0</strong>
            </div>
            <div class="summary-card">
                <span class="summary-label">Entregues</span>
                <strong class="summary-value" id="resumo-entregues">0</strong>
            </div>
            <div class="summary-card">
                <span class="summary-label">Faturamento</span>
                <strong class="summary-value">
                    <span style="font-size: 16px; display:block;">R$</span> 
                    <span id="resumo-faturamento">0,00</span>
                </strong>
            </div>
        </div>

        <section class="card">
            <div class="table-header-filters">
                <div class="filter-title-group">
                    <h3>Todos os pedidos</h3>
                </div>
                <div class="filter-btn-group" id="botoes-filtro">
                    <button class="filter-btn active" onclick="filtrarTabela('Todos')">Todos</button>
                    <button class="filter-btn" onclick="filtrarTabela('Recebido')">Recebido</button>
                    <button class="filter-btn" onclick="filtrarTabela('Em preparo')">Em preparo</button>
                    <button class="filter-btn" onclick="filtrarTabela('Saiu p/ entrega')">Saiu p/ entrega</button>
                    <button class="filter-btn" onclick="filtrarTabela('Entregue')">Entregue</button>
                </div>
            </div>

            <div class="table-responsive">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Hora</th>
                            <th>Cliente</th>
                            <th>Telefone</th>
                            <th>Pedido</th> 
                            <th>Total</th>
                            <th>Status</th>
                            <th style="text-align: center;">Ações</th> </tr>
                    </thead>
                    <tbody id="tabela-pedidos-body">
                        <tr><td colspan="7" style="text-align: center;">Carregando pedidos de hoje...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="card">
            <h3>Produtos mais pedidos hoje</h3>
            <div class="chart-wrapper">
                <div class="chart-y-axis">
                    <span>Alta</span>
                    <span>Média</span>
                    <span>Baixa</span>
                </div>
                <div class="chart-container" id="grafico-barras">
                    </div>
            </div>
            <div class="top-items-list" id="lista-mais-pedidos" style="margin-top: 15px;">
                </div>
        </section>

    </main>
</div>

<script src="pedidos_do_dia.js"></script>
<script src="cardapio.js"></script>
</body>
</html>
